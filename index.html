<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星幕光影工作室 | 攝影與光影設計</title>
    <style>
        :root {
            --primary: #ffffff;
            --accent: #f4a261; /* 溫暖情感色 */
            --bg: #0d0d0d; /* 現代感深色底 */
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--primary); margin: 0; line-height: 1.6; }
        header { padding: 50px; text-align: center; }
        h1 { letter-spacing: 5px; text-transform: uppercase; }
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('placeholder-hero.jpg'); background-size: cover; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        footer { margin-top: 50px; padding: 20px; border-top: 1px solid #333; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <header>
        <h1>星幕光影工作室</h1>
        <p>捕捉光，影，與故事。</p>
    </header>
    <div class="hero">
        <h2>Modern Light. Emotional Soul.</h2>
    </div>
    <div class="container">
        <h3>服務項目</h3>
        <div class="grid">
            <div><h4>商業攝影</h4><p>打造極具現代感的品牌影像。</p></div>
            <div><h4>光影人像</h4><p>捕捉靈魂深處的動人情感。</p></div>
            <div><h4>影像設計</h4><p>精準的光影敘事規劃。</p></div>
        </div>
    </div>
    <footer>
        <p>星幕光影工作室 | 統一編號：00837665</p>
        <p>地址：高雄市仁武區八德南路1之1號1樓</p>
    </footer>
</body>
</html>
