<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星幕光影工作室 | 攝影與光影設計</title>
    <meta name="description" content="高雄星幕光影工作室，提供商業攝影、光影人像與專業影像敘事設計。捕捉您的瞬間，定格恆久光影。">
    <style>
        :root {
            --primary: #f4f4f4;
            --accent: #d4af37; /* 金屬質感暖金色 */
            --bg: #0a0a0a; /* 質感深黑 */
        }
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--primary); margin: 0; line-height: 1.8; }
        
        /* 導航 */
        nav { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }
        
        /* 視覺區 */
        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('hero.jpg'); background-size: cover; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        
        /* 內容區 */
        .container { max-width: 1100px; margin: 80px auto; padding: 0 20px; }
        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin-top: 50px; }
        .service-card { border: 1px solid #333; padding: 30px; transition: 0.3s; }
        .service-card:hover { border-color: var(--accent); }
        .accent { color: var(--accent); }

        footer { padding: 60px; text-align: center; border-top: 1px solid #333; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">星幕光影</div>
        <div>作品集 | 關於我們 | 聯繫</div>
    </nav>
    <main>
        <section class="hero">
            <h1>捕捉靈魂的光影敘事</h1>
            <p>星幕光影工作室，定義您的視覺美學</p>
        </section>
        <section class="container">
            <h2>我們的專業服務</h2>
            <div class="service-grid">
                <div class="service-card">
                    <h3 class="accent">商業攝影</h3>
                    <p>精確傳達品牌價值，運用光影構築行銷視覺，提升市場影響力。</p>
                </div>
                <div class="service-card">
                    <h3 class="accent">光影人像</h3>
                    <p>超越鏡頭的捕捉，定格人物深層情感，打造獨一無二的個人特質。</p>
                </div>
                <div class="service-card">
                    <h3 class="accent">設計與企劃</h3>
                    <p>從影像行銷到展演空間規劃，提供完整的視覺敘事解決方案。</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>星幕光影工作室 (統編：00837665)</p>
        <p>高雄市仁武區八德南路1之1號1樓</p>
        <p>&copy; 2026 Star Curtain Studio. All Rights Reserved.</p>
    </footer>
</body>
</html>
